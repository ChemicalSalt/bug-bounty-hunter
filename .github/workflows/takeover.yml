name: Subdomain Takeover Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Split domains into batches of 25
        id: split
        run: |
          total=$(wc -l < domains.txt)
          num_batches=$(( (total + 24) / 25 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT

  scan:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Split domains
        run: |
          start=$(( (${{ matrix.batch }} - 1) * 25 + 1 ))
          sed -n "${start},$((start + 24))p" domains.txt > batch_domains.txt
          echo "Scanning batch ${{ matrix.batch }}:"
          cat batch_domains.txt

      - name: Run subfinder
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          subfinder -dL batch_domains.txt -silent -o subs_raw.txt
          echo "Total subdomains found: $(wc -l < subs_raw.txt)"

      - name: Filter IP-based subdomains
        run: |
          grep -vP '^\d+[-\.]\d+[-\.]\d+[-\.]\d+\.' subs_raw.txt > subs.txt || true
          echo "After filtering: $(wc -l < subs.txt)"

      - name: Run httpx
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          httpx -l subs.txt -cname -status-code -mc 404 -silent -o cname_404.txt || true
          echo "Dead subdomains with CNAME: $(wc -l < cname_404.txt)"

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          nuclei -l cname_404.txt -t takeovers -silent -retries 2 -timeout 10 -bulk-size 25 -concurrency 25 -o results.txt || true
          echo "Nuclei findings: $(wc -l < results.txt 2>/dev/null || echo 0)"

      - name: Check results
        id: check_results
        run: |
          if [ -s results.txt ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: Show results
        run: |
          if [ -s results.txt ]; then
            echo "HITS FOUND:"
            cat results.txt
          else
            echo "No results found in batch ${{ matrix.batch }}"
          fi

      - name: Send email
        if: steps.check_results.outputs.has_results == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "🎯 Subdomain Takeover Found - Batch ${{ matrix.batch }}"
          body: |
            ═══════════════════════════════════
            🎯 SUBDOMAIN TAKEOVER VULNERABILITY
            ═══════════════════════════════════

            What this means:
            A subdomain is pointing to an external service (like GitHub Pages,
            Heroku, AWS S3, etc.) that has been deleted or is unclaimed.
            Anyone can register that service and take control of the subdomain.

            Severity: HIGH
            Impact: Account takeover, phishing, credential theft

            ───────────────────────────────────
            FINDINGS:
            ───────────────────────────────────
            ${{ steps.check_results.outputs.results }}

            ───────────────────────────────────
            NEXT STEPS:
            ───────────────────────────────────
            1. Verify the finding manually in browser
            2. Check the CNAME record: dig CNAME <subdomain>
            3. Confirm the external service is unclaimed
            4. Register the service to prove takeover (do NOT serve malicious content)
            5. Report to the bug bounty program immediately
            6. Include: subdomain, CNAME, proof of takeover, screenshots

            ───────────────────────────────────
            SCAN INFO:
            ───────────────────────────────────
            Batch: ${{ matrix.batch }}
            Run ID: ${{ github.run_id }}
            Repository: ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
