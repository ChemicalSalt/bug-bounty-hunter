name: Subdomain Takeover Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  scan:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Subdomain Takeover"
      tags: "takeover"
      httpx_flags: "-cname -status-code -mc 404 -silent"
      nuclei_input: "cname_404"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
