
name: Subdomain Takeover Scanner

on:
  schedule:
    - cron: '0 0 * * *'  # runs daily at midnight
  workflow_dispatch:  # allows manual run

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Run subfinder
        run: subfinder -dL domains.txt -silent -o subs.txt

      - name: Run nuclei takeover scan
        run: nuclei -l subs.txt -t takeovers -o results.txt

      - name: Send email if results found
        if: ${{ hashFiles('results.txt') != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: Takeover Hit Found!
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
