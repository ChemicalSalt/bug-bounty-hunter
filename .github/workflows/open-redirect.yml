name: Open Redirect Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'
jobs:
  scan:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Open Redirect"
      tags: "redirect"
      use_katana: true
      nuclei_input: "urls"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
