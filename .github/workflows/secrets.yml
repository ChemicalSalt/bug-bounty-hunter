name: Exposed Secrets Scanner

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          pip install trufflehog

      - name: Run scan
        run: bash exposed-secrets/scan.sh

      - name: Send email if results found
        if: ${{ hashFiles('exposed-secrets/results.txt') != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: Exposed Secrets Found!
          body: file://exposed-secrets/results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
