name: Exposed Jenkins Grafana Kibana Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Split domains into batches of 25
        id: split
        run: |
          total=$(wc -l < domains.txt)
          num_batches=$(( (total + 24) / 25 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT

  scan:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Split domains
        run: |
          start=$(( (${{ matrix.batch }} - 1) * 25 + 1 ))
          sed -n "${start},$((start + 24))p" domains.txt > batch_domains.txt
          echo "Scanning batch ${{ matrix.batch }}:"
          cat batch_domains.txt

      - name: Run subfinder
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          subfinder -dL batch_domains.txt -silent -o subs_raw.txt
          echo "Total subdomains found: $(wc -l < subs_raw.txt)"

      - name: Filter IP-based subdomains
        run: |
          grep -vP '^\d+[-\.]\d+[-\.]\d+[-\.]\d+\.' subs_raw.txt > subs.txt || true
          echo "After filtering: $(wc -l < subs.txt)"

      - name: Run httpx
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          httpx -l subs.txt -silent -o live_hosts.txt || true
          echo "Live hosts: $(wc -l < live_hosts.txt)"

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          nuclei -l live_hosts.txt -t exposures/panels/jenkins -t exposures/panels/grafana -t exposures/panels/kibana -t exposures/panels/kafka-ui.yaml -t exposures/panels/rabbitmq -silent -retries 2 -timeout 10 -bulk-size 25 -concurrency 25 -o results.txt || true
          echo "Findings: $(wc -l < results.txt 2>/dev/null || echo 0)"

      - name: Show results
        run: |
          if [ -s results.txt ]; then
            echo "EXPOSED PANELS FOUND:"
            cat results.txt
          else
            echo "No exposed panels found in batch ${{ matrix.batch }}"
          fi

      - name: Send email if results found
        if: success()
        run: |
          if [ ! -s results.txt ]; then
            echo "No hits, skipping email"
            exit 0
          fi

      - name: Send email
        if: success() && hashFiles('results.txt') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "⚙️ Exposed Jenkins/Grafana/Kibana Found - Batch ${{ matrix.batch }}"
          body: |
            ═══════════════════════════════════
            ⚙️ EXPOSED INTERNAL TOOL FOUND
            ═══════════════════════════════════
            
            What this means:
            An internal DevOps or monitoring tool is publicly exposed.
            Jenkins can lead to RCE, Grafana exposes metrics and data,
            Kibana exposes logs which may contain sensitive information.
            
            Severity: CRITICAL (Jenkins RCE), HIGH (Grafana/Kibana data)
            Impact: Remote code execution, data exposure, internal access
            
            ───────────────────────────────────
            FINDINGS:
            ───────────────────────────────────
            ${{ env.RESULTS }}
            
            ───────────────────────────────────
            NEXT STEPS:
            ───────────────────────────────────
            1. Open the URL in browser and confirm tool is accessible
            2. Identify exact tool — Jenkins, Grafana, Kibana, RabbitMQ
            3. Check if login is required or open access
            4. For Jenkins — check if script console is accessible
               /jenkins/script — if yes = CRITICAL RCE
            5. For Grafana — check if dashboards show sensitive data
            6. For Kibana — check if logs contain credentials or PII
            7. DO NOT execute any code or modify anything
            8. Report immediately with URL, tool type, access level, screenshot
            
            ───────────────────────────────────
            SCAN INFO:
            ───────────────────────────────────
            Batch: ${{ matrix.batch }}
            Run ID: ${{ github.run_id }}
            Time: ${{ github.run_started_at }}
            Repository: ${{ github.repository }}

          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

  notify-complete:
    needs: scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send completion email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "✅ Jenkins/Grafana/Kibana Scan Complete - ${{ github.run_id }}"
          body: |
            ═══════════════════════════════════
            ✅ JENKINS/GRAFANA/KIBANA SCAN COMPLETE
            ═══════════════════════════════════
            
            All batches have finished scanning.
            If any exposed tools were found you already received a separate email.
            If you received no hit emails — no exposed tools found this run.
            
            ───────────────────────────────────
            SCAN INFO:
            ───────────────────────────────────
            Status: ${{ needs.scan.result }}
            Run ID: ${{ github.run_id }}
            Time: ${{ github.run_started_at }}
            Repository: ${{ github.repository }}
            
            View full logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
