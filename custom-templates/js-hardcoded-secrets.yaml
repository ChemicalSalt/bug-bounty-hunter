id: js-hardcoded-secrets

info:
  name: Hardcoded Secrets in JavaScript Files
  author: BugBountyBot
  severity: high
  description: Detects hardcoded API keys, tokens, and secrets inside JavaScript files
  tags: token,secret,api-key,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/main.js"
      - "{{BaseURL}}/app.js"
      - "{{BaseURL}}/bundle.js"
      - "{{BaseURL}}/chunk.js"
      - "{{BaseURL}}/static/js/main.js"
      - "{{BaseURL}}/assets/js/app.js"
      - "{{BaseURL}}/js/app.js"
      - "{{BaseURL}}/js/main.js"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        condition: or
        regex:
          - "(?i)(api_key|apikey|api-key)\\s*[=:]\\s*['\"][a-zA-Z0-9_\\-]{20,}['\"]"
          - "(?i)(secret_key|secretkey|secret-key)\\s*[=:]\\s*['\"][a-zA-Z0-9_\\-]{20,}['\"]"
          - "(?i)(access_token|accesstoken)\\s*[=:]\\s*['\"][a-zA-Z0-9_\\-]{20,}['\"]"
          - "(?i)(auth_token|authtoken)\\s*[=:]\\s*['\"][a-zA-Z0-9_\\-]{20,}['\"]"
          - "(?i)aws_access_key_id\\s*[=:]\\s*['\"][A-Z0-9]{20}['\"]"
          - "(?i)aws_secret_access_key\\s*[=:]\\s*['\"][a-zA-Z0-9/+]{40}['\"]"
          - "(?i)(stripe_key|stripe_secret)\\s*[=:]\\s*['\"]sk_live_[a-zA-Z0-9]{24,}['\"]"
          - "(?i)firebase.*['\"][a-zA-Z0-9\\-_]{30,}['\"]"
          - "AIza[0-9A-Za-z\\-_]{35}"
          - "(?i)(password|passwd|pwd)\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
        part: body
